<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/1fef3cdd40.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <title>StarMusic</title>
</head>
    <body>
        <div class="container">
                    <nav class="side-bar">

                        <div class="nav-biblioteca">
                            <i class="fa-solid fa-book"></i>
                            <p>Biblioteca</p>
                            <button><i class="fa-solid fa-plus"></i>Criar</button>
                        </div>
                        <div class="nav-starlist">
                            <h5>Crie sua primeira StarList</h5>
                            <p>É facil, vamos te ajudar.</p>
                            <button>Criar StarList</button>
                        </div>
                        <div class="nav-starcast">
                            <h5>Que tal Seguir um StarCast</h5>
                            <p>Vamos avisar sobre novos ep's.</p>
                            <button>Explore StarCast</button>
                        </div>
                        <div class="nav-footer">
                            <a href="#">Legal</a>
                            <a href="#">Centro de Privacidade</a>
                            <a href="#">Politica Privacidade</a>
                            <a href="#">Cookies</a>
                            <a href="#">Sobre Anuncios</a>
                            <a href="#">Acessibilidade</a>
                        </div>
                        <button class="nav-lag">
                            <i class="fa-solid fa-language"></i>
                            Portugues do Brasil
                        </button>
                    </nav>
                
            <main>
               <header class="main-header">
                        <div class="nav-icons">
                            <i class="fa-solid fa-star logo-star"></i>
                            <div class="home-button">
                            <a href="#"><i class="fa-solid fa-house"></i></a>
                            </div>
                        </div>

                        <div class="search-bar">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" placeholder="O que quer ouvir?">
                        </div>
                        <div class="barra-sup">
                            <a href="#">StarMode</a>
                            <a href="#">Baixar</a>
                            <a href="#">Suporte</a>                
                        </div>
                        <div class="barra-login">
                            <a href="">Increva-se</a>
                            <button>Entrar</button>
                        </div>
                    
                </header>
                            <section class="content">
                                <h2>Musicas em Alta</h2>
                                <div class="music-grid"></div>
                            </section>

                            <section class="content">
                                <h2>Stars</h2>
                                <div class="artists-grid"></div>
                            </section>
                            <section class="content">
                                <h2>Albuns Mais Ouvidos</h2>
                                <div class="albuns-grid"></div>

                            </section>
            </main>
      
         </div> 
    </body>
    <script src="script.js"></script>
</html>
